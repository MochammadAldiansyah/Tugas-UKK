{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - AntrianBarang</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>Antrian<span style="color:var(--primary)">Barang</span></h1>
      <p class="subtitle">Masuk ke Panel Admin</p>
      
      {% if messages %}
        {% for msg in messages %}
        <div class="error-msg">{{ msg }}</div>
        {% endfor %}
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">USERNAME</label>
          <input type="text" name="username" class="form-input" placeholder="Masukkan username" required>
        </div>
        <div class="form-group">
          <label class="form-label">PASSWORD</label>
          <input type="password" name="password" class="form-input" placeholder="Masukkan password" required>
        </div>
        <button type="submit" class="btn btn-primary">Masuk</button>
      </form>
      <p style="text-align:center;margin-top:16px;font-size:.8125rem;color:var(--gray-400);">
        <a href="{% url 'antrian:ambil_antrian' %}" style="color:var(--primary);text-decoration:none;">← Kembali ke halaman utama</a>
      </p>
    </div>
  </div>
</body>
</html>
